<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krispy Exerise</title>
</head>
<body>
    <img src="logo.png" alt="img" id="img" class="img">
    <h1 id="title">LET'S EXERCISE YOUR KNOWLEDGE</h1>

    <!-- quiz-container -->
    <div id="quiz-container">
        <!-- question container -->
        <div class="questions">
            <h2 id="question"></h2>
            <ol type="A">
                <li class="option"><span id="option0" onclick="calcScore(this)"></span></li>
                <li class="option"><span id="option1" onclick="calcScore(this)"></span></li>
                <li class="option"><span id="option2" onclick="calcScore(this)"></span></li>
                <li class="option"><span id="option3" onclick="calcScore(this)"></span></li>
            </ol>
            <h4 id="stat"></h4>
        </div>

        <div class="buttons">
            <button type="button" class="next">Next</button>
        </div>

    </div>

    <!-- scoreboard section -->
    <div id="scoreboard">
        <img src="celebrate.webp" alt="">
        <h2 id="score-title">Your Score</h2>
        <h2 id="score"></h2>
        <h1>CONGRATS</h1>
        <a href="HOMEPAGE.html" class="nav_link sublink">Home</a>
        <button type="button" id="score-btn" onclick="backToQuiz()">Back to Quiz</button>
        <button type="button" id="check-answer" onclick="checkAnswer()">Check Answers</button>
    </div>

    <!-- answers section -->
    <div id="answerBank">
        <h2>Answers :</h2>
        <ol type="1" id="answers">

        </ol>
        <button type="button" id="score-btn" onclick="backToQuiz()">Back to Quiz</button>
    </div>
</body>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    font-family: sans-serif;
    background: linear-gradient(115deg, rgba(101,151,209,0.8),rgba(202,102,211,0.5)),url(/quizbg.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
}
img{
    width: 5.5rem;
    height: 5.2rem;
    border-radius: 50%;
}
.img{
    position: fixed;
}
#title{
    text-align: center;
    padding: 0.8rem 0;
    font-size: 3rem;
    color: rgb(49,70,7);
    background: rgba(105,224,90,0.55);
    font-family: Georgia, 'Times New Roman', Times, serif;
}
.questions{
    margin: 3rem auto;
    width: 90vw;
    padding: 2rem;
    background: rgba(0,255,221,0.45);
    cursor: default;
    border-radius: 1rem;
}
#question{
    margin-bottom: 1rem;
}
.option{
    margin-bottom: 0.5rem;
    font-size: 1.2rem;
    border-bottom: solid 0.1rem blue;
    width: 15rem;
    background: lightblue;
    border-radius: 1rem;
}
.option:hover{
    color: white;
}
ol{
    position: relative;
    padding: 0 1.5rem;
    color: rgb(1,73,73);
}
span{
    display: block;
    padding: 0.1rem 0.7rem;
    border-radius: 1rem;
}
#answer{
    margin-top: 2.5rem;
}
#stat{
    margin-top: 1.5rem;
    color: rgb(6,17,168);
}
.buttons{
    text-align: center;
}
button{
    padding: 0.2rem 1.5rem;
    border: none;
    outline: none;
    font-size: 1.5rem;
    border-radius: 1.5rem;
    color: rgba(93,53,156,0.98);
    background: rgba(161,177,19,0.82);
}
button:active{
    background: lavender;
}
#scoreboard,#answerBank{
    width: 20rem;
    background: rgba(230,230,250,0.77);
    padding: 2rem;
    text-align: center;
    margin: auto;
    position: relative;
    top: 5rem;
    display: none;
}
#score-title{
    margin: 1rem 0;
}
#score-btn,#check-answer{
    margin-top: 1rem;
}
#score{
    font-size: 2.5rem;
}
#answerBank li{
    text-align: left;
    margin-bottom: 0.2rem;
    font-size: larger;
}
#answers{
    margin-top: 1rem;
}
div a{
    background-color: limegreen;
    color:rgba(93,53,156,0.98);
    font-size: 50px;
    border-color: 20px solid limegreen;
    border-radius: 20px;
}
</style>
<script>
    //Question bank
var questionBank= [
    {
        question : 'WHAT HTML STANDS FOR?',
        option : ['Hyper Technology Mail Language','HyperText Markup Language','Hyper Texting Make Laboratory','HyperText Marking Language'],
        answer : 'HyperText Markup Language'
    },
    {
        question : 'Is the standard markup language for creating Web pages.',
        option : ['CSS','HTML','JAVA','JavaScript'],
        answer : 'HTML'
    },
    {
        question : 'Visual representations are defined by?',
        option : ['HTML','JavaScript','Bootstrap','Cascading Style Sheets'],
        answer : 'Cascading Style Sheets'
    },
    {
        question : 'short for document type help browsers to understand the version of HTML the document is written in for better interpretability. Doctype declarations are not HTML tags and belong at the very top of a document.',
        option : ['paragraph','doctypes','image','brake'],
        answer : 'doctypes'
    },
    {
        question : 'While most HTML tags are used to create elements, HTML also provides in-text formatting tags to apply specific text-related styles to portions of text.',
        option : ['Text Formatting','Highlighting','bold,italic,undline','none of the above'],
        answer : 'Text Formatting'
    },
    {
        question : 'Defines the HTML version used in the document. In this case it is HTML5.See the doctypes topic for more information.',
        option : ['&lt;!DOCTYPE&gt;','&lt;br&gt;','&lt;p&gt;','none of the above'],
        answer : '&lt;!DOCTYPE&gt;'
    },
    {
        question : 'the primary language of the page using the ISO language codes (en for English).See the Content Language topic for more information.',
        option : ['&lt;!DOCTYPE&gt;','&lt;br&gt;','&lt;p&gt;','&lt;html&gt;'],
        answer : '&lt;html&gt;'
    },
    {
        question : 'information about the HTML document, called metadata. It can also contain imports from externalstylesheets and scripts. The closing tag is &lt;/head&gt;..',
        option : ['&lt;!DOCTYPE&gt;','&lt;/head&gt;','&lt;head&gt;','&lt;html&gt;'],
        answer : '&lt;head&gt;'
    },
    {
        question : 'Gives the browser some metadata about the document. The charset attribute declares the characterencoding. Modern HTML documents should always use UTF-8, even though it is not a requirement. InHTML, the <meta> tag does not require a closing tag.See the Meta topic for more information.',
        option : ['&lt;!DOCTYPE&gt;','&lt;/head&gt;','&lt;head&gt;','&lt;meta&gt;'],
        answer : '&lt;meta&gt;'
    },
    {
        question : 'A level 1 heading for the page.See headings for more information.',
        option : ['&lt;h1&gt;','&lt;h2&gt;','&lt;h3&gt;','&lt;h4&gt;'],
        answer : '&lt;h1&gt;'
    },
]

var question= document.getElementById('question');
var quizContainer= document.getElementById('quiz-container');
var scorecard= document.getElementById('scorecard');
var option0= document.getElementById('option0');
var option1= document.getElementById('option1');
var option2= document.getElementById('option2');
var option3= document.getElementById('option3');
var option4= document.getElementById('option4');
var option5= document.getElementById('option5');
var option6= document.getElementById('option6');
var option7= document.getElementById('option7');
var option8= document.getElementById('option8');
var next= document.querySelector('.next');
var points= document.getElementById('score');
var span= document.querySelectorAll('span');
var i=0;
var score= 0;

//function to display questions
function displayQuestion(){
    for(var a=0;a<span.length;a++){
        span[a].style.background='none';
    }
    question.innerHTML= 'Q.'+(i+1)+' '+questionBank[i].question;
    option0.innerHTML= questionBank[i].option[0];
    option1.innerHTML= questionBank[i].option[1];
    option2.innerHTML= questionBank[i].option[2];
    option3.innerHTML= questionBank[i].option[3];
    option4.innerHTML= questionBank[i].option[4];
    option5.innerHTML= questionBank[i].option[5];
    option6.innerHTML= questionBank[i].option[6];
    option7.innerHTML= questionBank[i].option[7];
    option8.innerHTML= questionBank[i].option[8];
    stat.innerHTML= "Question"+' '+(i+1)+' '+'of'+' '+questionBank.length;
}

//function to calculate scores
function calcScore(e){
    if(e.innerHTML===questionBank[i].answer && score<questionBank.length)
    {
        score= score+1;
        document.getElementById(e.id).style.background= 'limegreen';
    }
    else{
        document.getElementById(e.id).style.background= 'tomato';
    }
    setTimeout(nextQuestion,300);
}

//function to display next question
function nextQuestion(){
    if(i<questionBank.length-1)
    {
        i=i+1;
        displayQuestion();
    }
    else{
        points.innerHTML= score+ '/'+ questionBank.length;
        quizContainer.style.display= 'none';
        scoreboard.style.display= 'block'
    }
}

//click events to next button
next.addEventListener('click',nextQuestion);

//Back to Quiz button event
function backToQuiz(){
    location.reload();
}

//function to check Answers
function checkAnswer(){
    var answerBank= document.getElementById('answerBank');
    var answers= document.getElementById('answers');
    answerBank.style.display= 'block';
    scoreboard.style.display= 'none';
    for(var a=0;a<questionBank.length;a++)
    {
        var list= document.createElement('li');
        list.innerHTML= questionBank[a].answer;
        answers.appendChild(list);
    }
}


displayQuestion();
</script>
</html>
